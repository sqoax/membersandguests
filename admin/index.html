
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin &mdash; Members &amp; Guests</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="/favicon3.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --cream: #f8f5f0;
  --cream-muted: #ede9e3;
  --navy: #1a2744;
  --navy-light: #243354;
  --forest: #2d4a2d;
  --gold: #c9a96e;
  --text-cream: #f8f5f0;
  --text-muted: rgba(248, 245, 240, 0.66);
  --text-dark: #1a2744;
  --text-dark-muted: rgba(26, 39, 68, 0.58);
  --field-border: rgba(26, 39, 68, 0.12);
  --field-border-focus: rgba(26, 39, 68, 0.35);
  --field-bg: rgba(26, 39, 68, 0.02);
  --danger: #8a2d2d;
  --serif: 'Cormorant Garamond', 'Georgia', serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  min-height: 100vh;
  font-family: var(--sans);
  font-weight: 300;
  color: var(--text-dark);
  background:
    linear-gradient(180deg, rgba(248, 245, 240, 0.96), rgba(237, 233, 227, 0.9)),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: auto, 220px 220px;
  line-height: 1.6;
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

.hidden {
  display: none !important;
}

.login-screen {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 2rem;
  background: var(--navy);
  position: relative;
  overflow: hidden;
}

.login-screen::after {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events: none;
}

.login-panel {
  width: min(100%, 420px);
  position: relative;
  z-index: 1;
  text-align: center;
}

.wordmark {
  font-family: var(--serif);
  font-size: clamp(2.4rem, 9vw, 4.2rem);
  font-weight: 300;
  color: var(--text-cream);
  letter-spacing: -0.015em;
  line-height: 1;
  margin-bottom: 0.75rem;
}

.login-kicker {
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: clamp(2.2rem, 8vw, 3rem);
}

.login-form {
  display: grid;
  gap: 0.9rem;
}

.password-input {
  width: 100%;
  min-height: 54px;
  padding: 0 1rem;
  color: var(--text-cream);
  background: rgba(248, 245, 240, 0.06);
  border: 1px solid rgba(248, 245, 240, 0.18);
  border-radius: 0;
  outline: none;
  text-align: center;
  letter-spacing: 0.04em;
  transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
}

.password-input::placeholder {
  color: rgba(248, 245, 240, 0.45);
  letter-spacing: 0.08em;
}

.password-input:focus {
  border-color: var(--gold);
  background: rgba(248, 245, 240, 0.09);
  box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.12);
}

.primary-btn,
.secondary-btn,
.invite-btn,
.danger-btn,
.tab-btn {
  min-height: 44px;
  border-radius: 0;
  transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease, opacity 0.25s ease, transform 0.25s ease;
}

.primary-btn {
  border: 1px solid var(--gold);
  background: var(--gold);
  color: var(--navy);
  padding: 0 1.4rem;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.primary-btn:hover {
  background: #d7bb83;
  border-color: #d7bb83;
}

.primary-btn:active,
.secondary-btn:active,
.invite-btn:active,
.danger-btn:active,
.tab-btn:active {
  transform: translateY(1px);
}

.login-error {
  min-height: 1.4rem;
  color: #e7b4a8;
  font-size: 0.78rem;
  letter-spacing: 0.02em;
}

.dashboard {
  min-height: 100vh;
}

.admin-header {
  background: var(--navy);
  color: var(--text-cream);
}

.admin-header-inner {
  max-width: 1180px;
  margin: 0 auto;
  padding: clamp(2.5rem, 5vw, 4.5rem) 1.5rem clamp(2rem, 4vw, 3.2rem);
}

.admin-wordmark {
  font-family: var(--serif);
  font-size: 1.12rem;
  font-weight: 400;
  color: var(--text-cream);
  line-height: 1;
  margin-bottom: clamp(2rem, 4vw, 2.8rem);
}

.admin-title-row {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 1.5rem;
}

.admin-title {
  font-family: var(--serif);
  font-size: clamp(2.3rem, 6vw, 4rem);
  font-weight: 300;
  color: var(--text-cream);
  letter-spacing: -0.015em;
  line-height: 1.05;
}

.admin-subtitle {
  max-width: 520px;
  color: var(--text-muted);
  font-size: 0.92rem;
  line-height: 1.7;
  margin-top: 0.95rem;
}

.refresh-btn {
  flex: 0 0 auto;
}

.dashboard-main {
  max-width: 1180px;
  margin: 0 auto;
  padding: clamp(1.6rem, 4vw, 2.8rem) 1.5rem clamp(4rem, 8vw, 6rem);
}

.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--field-border);
  margin-bottom: clamp(1.5rem, 4vw, 2.4rem);
}

.tab-btn {
  background: transparent;
  border: 0;
  border-bottom: 2px solid transparent;
  color: var(--text-dark-muted);
  padding: 0 1.1rem;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.tab-btn:first-child {
  padding-left: 0;
}

.tab-btn.active {
  color: var(--text-dark);
  border-color: var(--gold);
}

.status-line {
  min-height: 1.6rem;
  color: var(--text-dark-muted);
  font-size: 0.82rem;
  margin-bottom: 1rem;
}

.status-line.error {
  color: var(--danger);
}

.application-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr));
  gap: 1rem;
}

.application-card {
  background: rgba(255, 255, 255, 0.48);
  border: 1px solid var(--field-border);
  padding: 1.35rem;
  box-shadow: 0 20px 50px rgba(26, 39, 68, 0.05);
}

.card-top {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  align-items: start;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--field-border);
  margin-bottom: 1rem;
}

.applicant-name {
  font-family: var(--serif);
  font-size: 1.72rem;
  font-weight: 400;
  color: var(--text-dark);
  letter-spacing: -0.01em;
  line-height: 1.1;
}

.applicant-email {
  color: var(--text-dark-muted);
  font-size: 0.82rem;
  word-break: break-word;
  margin-top: 0.28rem;
}

.date-pill {
  flex: 0 0 auto;
  color: var(--text-dark-muted);
  border: 1px solid var(--field-border);
  padding: 0.35rem 0.5rem;
  font-size: 0.66rem;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}

.detail-list {
  display: grid;
  gap: 0.7rem;
}

.detail-item {
  display: grid;
  grid-template-columns: minmax(92px, 0.42fr) 1fr;
  gap: 0.85rem;
}

.detail-label {
  color: var(--text-dark-muted);
  font-size: 0.64rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.detail-value {
  color: var(--text-dark);
  font-size: 0.86rem;
  word-break: break-word;
}

.detail-item.full {
  grid-template-columns: 1fr;
  gap: 0.25rem;
}

.card-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.65rem;
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid var(--field-border);
}

.secondary-btn,
.invite-area {
  flex: 1 1 130px;
  display: grid;
  gap: 0.35rem;
}

.invite-btn,
.danger-btn {
  flex: 1 1 130px;
  border: 1px solid var(--navy);
  padding: 0 1rem;
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.13em;
  text-transform: uppercase;
}

.invite-btn {
  width: 100%;
  color: var(--gold);
  background: transparent;
  border-color: var(--gold);
}

.invite-btn:hover {
  color: var(--navy);
  background: var(--gold);
}

.invite-error {
  min-height: 1rem;
  color: var(--danger);
  font-size: 0.72rem;
  line-height: 1.35;
}

.secondary-btn {
  color: var(--text-cream);
  background: var(--navy);
}

.secondary-btn:hover {
  background: var(--navy-light);
  border-color: var(--navy-light);
}

.danger-btn {
  color: var(--danger);
  background: transparent;
  border-color: rgba(138, 45, 45, 0.28);
}

.danger-btn:hover {
  color: var(--text-cream);
  background: var(--danger);
  border-color: var(--danger);
}

button:disabled {
  cursor: wait;
  opacity: 0.62;
}

.empty-state,
.loading-state {
  border: 1px solid var(--field-border);
  padding: clamp(2.2rem, 7vw, 4rem) 1.5rem;
  text-align: center;
  color: var(--text-dark-muted);
  background: rgba(255, 255, 255, 0.38);
}

.empty-title {
  font-family: var(--serif);
  font-size: clamp(1.7rem, 4vw, 2.4rem);
  font-weight: 300;
  color: var(--text-dark);
  letter-spacing: -0.01em;
  margin-bottom: 0.35rem;
}

.thread-grid {
  display: grid;
  gap: 0.75rem;
}

.thread-card {
  background: rgba(255, 255, 255, 0.48);
  border: 1px solid var(--field-border);
  padding: 1.15rem 1.3rem;
  display: grid;
  gap: 0.55rem;
  cursor: pointer;
  text-align: left;
  width: 100%;
  font: inherit;
  color: inherit;
  transition: background 0.2s ease, border-color 0.2s ease;
}

.thread-card:hover {
  background: rgba(255, 255, 255, 0.72);
  border-color: var(--field-border-focus);
}

.thread-pair {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 1rem;
}

.thread-names {
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 400;
  color: var(--text-dark);
  line-height: 1.25;
}

.thread-preview {
  color: var(--text-dark);
  font-size: 0.86rem;
  line-height: 1.45;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.thread-preview.empty {
  color: var(--text-dark-muted);
  font-style: italic;
}

.thread-meta {
  display: flex;
  gap: 0.9rem;
  flex-wrap: wrap;
  color: var(--text-dark-muted);
  font-size: 0.7rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.msg-modal {
  position: fixed;
  inset: 0;
  background: rgba(26, 39, 68, 0.56);
  display: grid;
  place-items: center;
  padding: 1rem;
  z-index: 100;
}

.msg-modal-panel {
  width: min(100%, 640px);
  max-height: min(92vh, 780px);
  background: var(--cream);
  border: 1px solid var(--field-border);
  display: flex;
  flex-direction: column;
}

.msg-modal-head {
  padding: 1.1rem 1.3rem;
  border-bottom: 1px solid var(--field-border);
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 1rem;
}

.msg-modal-title {
  font-family: var(--serif);
  font-size: 1.4rem;
  font-weight: 400;
  color: var(--text-dark);
  line-height: 1.2;
}

.msg-modal-sub {
  color: var(--text-dark-muted);
  font-size: 0.76rem;
  margin-top: 0.25rem;
  line-height: 1.45;
}

.msg-modal-actions {
  display: flex;
  gap: 0.45rem;
  flex-shrink: 0;
}

.icon-btn {
  background: transparent;
  border: 1px solid var(--field-border);
  min-height: 32px;
  padding: 0 0.7rem;
  color: var(--text-dark-muted);
  font-size: 0.66rem;
  font-weight: 500;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}

.icon-btn:hover {
  color: var(--text-dark);
  border-color: var(--field-border-focus);
}

.icon-btn.danger {
  color: var(--danger);
  border-color: rgba(138, 45, 45, 0.28);
}

.icon-btn.danger:hover {
  color: var(--text-cream);
  background: var(--danger);
  border-color: var(--danger);
}

.msg-modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 1.2rem 1.3rem;
  background: rgba(255, 255, 255, 0.4);
}

.msg-row {
  display: grid;
  gap: 0.3rem;
  margin-bottom: 1rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--field-border);
}

.msg-row:last-child {
  margin-bottom: 0;
  padding-bottom: 0;
  border-bottom: 0;
}

.msg-row-head {
  display: flex;
  gap: 0.7rem;
  align-items: baseline;
}

.msg-row-sender {
  font-family: var(--serif);
  font-size: 0.98rem;
  color: var(--text-dark);
}

.msg-row-time {
  color: var(--text-dark-muted);
  font-size: 0.66rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.msg-row-del {
  margin-left: auto;
  background: transparent;
  border: 0;
  color: var(--text-dark-muted);
  font-size: 0.66rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 0.15rem 0.3rem;
}

.msg-row-del:hover {
  color: var(--danger);
}

.msg-row-body {
  color: var(--text-dark);
  font-size: 0.92rem;
  line-height: 1.55;
  white-space: pre-wrap;
  word-wrap: break-word;
}

.msg-modal-empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-dark-muted);
  font-size: 0.85rem;
}

@media (max-width: 720px) {
  .admin-title-row,
  .card-top {
    display: grid;
    align-items: start;
  }

  .refresh-btn {
    width: 100%;
  }

  .tabs {
    overflow-x: auto;
  }

  .tab-btn {
    flex: 1 0 auto;
    padding: 0 0.8rem;
  }

  .tab-btn:first-child {
    padding-left: 0.2rem;
  }

  .detail-item {
    grid-template-columns: 1fr;
    gap: 0.2rem;
  }

  .date-pill {
    width: fit-content;
  }
}
</style>
</head>
<body>
<section class="login-screen" id="login-screen">
  <div class="login-panel">
    <div class="wordmark">Members &amp; Guests</div>
    <div class="login-kicker">Admin Dashboard</div>
    <form class="login-form" id="login-form">
      <input class="password-input" id="admin-password" type="password" placeholder="Password" autocomplete="current-password" aria-label="Admin password">
      <button class="primary-btn" type="submit">Enter</button>
      <p class="login-error" id="login-error" aria-live="polite"></p>
    </form>
  </div>
</section>

<section class="dashboard hidden" id="dashboard">
  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-wordmark">Members &amp; Guests</div>
      <div class="admin-title-row">
        <div>
          <h1 class="admin-title">Applications</h1>
          <p class="admin-subtitle">Review membership requests, approve verified applicants, or remove entries from the application queue.</p>
        </div>
        <button class="primary-btn refresh-btn" id="refresh-btn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="tabs" role="tablist" aria-label="Application status">
      <button class="tab-btn active" id="pending-tab" type="button" role="tab" aria-selected="true" data-tab="pending">Pending <span id="pending-count">0</span></button>
      <button class="tab-btn" id="approved-tab" type="button" role="tab" aria-selected="false" data-tab="verified">Approved <span id="approved-count">0</span></button>
      <button class="tab-btn" id="messages-tab" type="button" role="tab" aria-selected="false" data-tab="messages">Messages <span id="messages-count">0</span></button>
    </div>
    <p class="status-line" id="status-line" aria-live="polite"></p>
    <div id="content"></div>
  </main>
</section>

<div class="msg-modal hidden" id="msg-modal" role="dialog" aria-modal="true" aria-labelledby="msg-modal-title">
  <div class="msg-modal-panel">
    <div class="msg-modal-head">
      <div>
        <div class="msg-modal-title" id="msg-modal-title">Conversation</div>
        <div class="msg-modal-sub" id="msg-modal-sub"></div>
      </div>
      <div class="msg-modal-actions">
        <button class="icon-btn danger" id="msg-modal-delete" type="button">Delete thread</button>
        <button class="icon-btn" id="msg-modal-close" type="button">Close</button>
      </div>
    </div>
    <div class="msg-modal-body" id="msg-modal-body"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var SUPABASE_URL = 'https://upohsbvsycwjsjbtwsll.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_OaX6cAttsvPQHx_Ru82v3Q_r0qXPX2N';
  var ADMIN_FN_URL = SUPABASE_URL + '/functions/v1/admin-actions';
  var UNLOCKED_KEY = 'mg_admin_unlocked';
  var PASSWORD_KEY = 'mg_admin_pw';

  var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function getAdminPassword() {
    return sessionStorage.getItem(PASSWORD_KEY) || '';
  }

  function callAdmin(action, payload) {
    var body = Object.assign({ password: getAdminPassword(), action: action }, payload || {});
    return fetch(ADMIN_FN_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify(body)
    }).then(function(res) {
      return res.json().then(function(data) {
        return { ok: res.ok, status: res.status, data: data };
      }, function() {
        return { ok: res.ok, status: res.status, data: {} };
      });
    });
  }
  var loginScreen = document.getElementById('login-screen');
  var dashboard = document.getElementById('dashboard');
  var loginForm = document.getElementById('login-form');
  var passwordInput = document.getElementById('admin-password');
  var loginError = document.getElementById('login-error');
  var refreshBtn = document.getElementById('refresh-btn');
  var tabButtons = Array.prototype.slice.call(document.querySelectorAll('.tab-btn'));
  var pendingCount = document.getElementById('pending-count');
  var approvedCount = document.getElementById('approved-count');
  var messagesCount = document.getElementById('messages-count');
  var statusLine = document.getElementById('status-line');
  var content = document.getElementById('content');
  var msgModal = document.getElementById('msg-modal');
  var msgModalTitle = document.getElementById('msg-modal-title');
  var msgModalSub = document.getElementById('msg-modal-sub');
  var msgModalBody = document.getElementById('msg-modal-body');
  var msgModalClose = document.getElementById('msg-modal-close');
  var msgModalDelete = document.getElementById('msg-modal-delete');

  var applications = [];
  var threads = [];
  var currentThreadId = null;
  var activeTab = 'pending';
  var isLoading = false;
  var isLoadingThreads = false;

  // Human-readable labels — must stay in sync with /apply form.
  var MEMBERSHIP_LABELS = {
    full: 'Full / Equity',
    golf: 'Golf Only',
    'social-golf': 'Social with Golf',
    legacy: 'Legacy / Family',
    'non-resident': 'Non-Resident',
    other: 'Other'
  };
  var HOST_LABELS = {
    yes: 'Happy to host',
    sometimes: 'Occasionally',
    no: 'Prefer to visit'
  };
  var HEARD_LABELS = {
    friend: 'Friend or fellow member',
    instagram: 'Instagram',
    search: 'Search engine',
    article: 'Article or press',
    'pro-shop': 'Pro shop or club staff',
    other: 'Other'
  };

  function prettyMembership(v) { return MEMBERSHIP_LABELS[v] || v; }
  function prettyHost(v) { return HOST_LABELS[v] || v; }
  function prettyHeard(v) { return HEARD_LABELS[v] || v; }

  function unlock() {
    sessionStorage.setItem(UNLOCKED_KEY, 'true');
    loginScreen.classList.add('hidden');
    dashboard.classList.remove('hidden');
    fetchApplications();
    fetchThreads();
  }

  function showLogin() {
    loginScreen.classList.remove('hidden');
    dashboard.classList.add('hidden');
    setTimeout(function() {
      passwordInput.focus();
    }, 0);
  }

  function setStatus(message, isError) {
    statusLine.textContent = message || '';
    statusLine.classList.toggle('error', !!isError);
  }

  function fetchApplications() {
    isLoading = true;
    setStatus('Loading applications...');
    render();

    supabase
      .from('applications')
      .select('*')
      .order('created_at', { ascending: false })
      .then(function(result) {
        isLoading = false;
        if (result.error) {
          setStatus('Could not load applications. Check Supabase table permissions and try again.', true);
          applications = [];
        } else {
          applications = result.data || [];
          setStatus('');
        }
        render();
      });
  }

  function getRowsForStatus(status) {
    return applications.filter(function(app) {
      return app.status === status;
    });
  }

  function renderCounts() {
    pendingCount.textContent = String(getRowsForStatus('pending').length);
    approvedCount.textContent = String(getRowsForStatus('verified').length);
    messagesCount.textContent = String(threads.length);
  }

  function fetchThreads() {
    isLoadingThreads = true;
    if (activeTab === 'messages') {
      setStatus('Loading conversations...');
      render();
    }
    callAdmin('list_threads', {}).then(function(result) {
      isLoadingThreads = false;
      if (!result.ok || !result.data || !Array.isArray(result.data.data)) {
        if (activeTab === 'messages') {
          setStatus((result.data && result.data.error) || 'Could not load conversations.', true);
        }
        threads = [];
      } else {
        threads = result.data.data;
        if (activeTab === 'messages') setStatus('');
      }
      render();
    }, function() {
      isLoadingThreads = false;
      if (activeTab === 'messages') setStatus('Network error loading conversations.', true);
      render();
    });
  }

  function formatDateTime(value) {
    if (!value) return '';
    var date = new Date(value);
    if (Number.isNaN(date.getTime())) return '';
    return date.toLocaleString(undefined, {
      month: 'short',
      day: 'numeric',
      year: 'numeric',
      hour: 'numeric',
      minute: '2-digit'
    });
  }

  function truncate(text, n) {
    if (!text) return '';
    var s = String(text).replace(/\s+/g, ' ').trim();
    return s.length > n ? s.slice(0, n - 1) + '\u2026' : s;
  }

  function createThreadCard(thread) {
    var card = document.createElement('button');
    card.className = 'thread-card';
    card.type = 'button';
    card.setAttribute('data-thread-id', thread.id);

    var pair = document.createElement('div');
    pair.className = 'thread-pair';
    var names = document.createElement('div');
    names.className = 'thread-names';
    names.textContent = thread.member_a.name + '  \u00b7  ' + thread.member_b.name;
    var pill = document.createElement('div');
    pill.className = 'date-pill';
    pill.textContent = formatDate(thread.last_activity_at);
    pair.appendChild(names);
    pair.appendChild(pill);

    var preview = document.createElement('div');
    if (thread.last_message) {
      var who = thread.last_message.sender_id === thread.member_a.id ? thread.member_a.name : thread.member_b.name;
      preview.className = 'thread-preview';
      preview.textContent = who + ': ' + truncate(thread.last_message.body, 140);
    } else {
      preview.className = 'thread-preview empty';
      preview.textContent = 'No messages yet.';
    }

    var meta = document.createElement('div');
    meta.className = 'thread-meta';
    var clubs = [thread.member_a.club, thread.member_b.club].filter(Boolean).join(' \u00b7 ');
    if (clubs) {
      var clubSpan = document.createElement('span');
      clubSpan.textContent = clubs;
      meta.appendChild(clubSpan);
    }
    var countSpan = document.createElement('span');
    countSpan.textContent = thread.message_count + ' ' + (thread.message_count === 1 ? 'message' : 'messages');
    meta.appendChild(countSpan);

    card.appendChild(pair);
    card.appendChild(preview);
    card.appendChild(meta);
    card.addEventListener('click', function() {
      openThread(thread.id);
    });
    return card;
  }

  function renderThreadsTab() {
    if (isLoadingThreads && !threads.length) {
      var loading = document.createElement('div');
      loading.className = 'loading-state';
      loading.textContent = 'Loading conversations...';
      content.appendChild(loading);
      return;
    }
    if (!threads.length) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      var title = document.createElement('h2');
      title.className = 'empty-title';
      title.textContent = 'No conversations yet.';
      var copy = document.createElement('p');
      copy.textContent = 'Conversations between members will appear here.';
      empty.appendChild(title);
      empty.appendChild(copy);
      content.appendChild(empty);
      return;
    }
    var grid = document.createElement('div');
    grid.className = 'thread-grid';
    threads.forEach(function(t) {
      grid.appendChild(createThreadCard(t));
    });
    content.appendChild(grid);
  }

  function setActiveTab(tab) {
    activeTab = tab;
    tabButtons.forEach(function(button) {
      var isActive = button.getAttribute('data-tab') === activeTab;
      button.classList.toggle('active', isActive);
      button.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    render();
  }

  function formatValue(value) {
    if (value === null || value === undefined || value === '') return '-';
    return String(value);
  }

  function formatDate(value) {
    if (!value) return 'No date';
    var date = new Date(value);
    if (Number.isNaN(date.getTime())) return 'No date';
    return date.toLocaleDateString(undefined, {
      month: 'short',
      day: 'numeric',
      year: 'numeric'
    });
  }

  function getFullName(app) {
    var name = [app.first_name, app.last_name].filter(Boolean).join(' ').trim();
    return name || 'Unnamed applicant';
  }

  function createDetail(label, value, isFull) {
    var item = document.createElement('div');
    item.className = isFull ? 'detail-item full' : 'detail-item';

    var labelEl = document.createElement('div');
    labelEl.className = 'detail-label';
    labelEl.textContent = label;

    var valueEl = document.createElement('div');
    valueEl.className = 'detail-value';
    valueEl.textContent = formatValue(value);

    item.appendChild(labelEl);
    item.appendChild(valueEl);
    return item;
  }

  function createCard(app) {
    var card = document.createElement('article');
    card.className = 'application-card';

    var top = document.createElement('div');
    top.className = 'card-top';

    var identity = document.createElement('div');
    var name = document.createElement('h2');
    name.className = 'applicant-name';
    name.textContent = getFullName(app);

    var email = document.createElement('div');
    email.className = 'applicant-email';
    email.textContent = formatValue(app.email);

    identity.appendChild(name);
    identity.appendChild(email);

    var date = document.createElement('div');
    date.className = 'date-pill';
    date.textContent = formatDate(app.created_at);

    top.appendChild(identity);
    top.appendChild(date);

    var details = document.createElement('div');
    details.className = 'detail-list';
    details.appendChild(createDetail('Club', app.club_name));
    details.appendChild(createDetail('Location', app.club_location));
    details.appendChild(createDetail('Membership', prettyMembership(app.membership_type)));
    details.appendChild(createDetail('Member Since', app.member_since));
    details.appendChild(createDetail('Handicap', app.handicap));
    details.appendChild(createDetail('Host', prettyHost(app.willing_to_host)));
    details.appendChild(createDetail('City', app.city));
    details.appendChild(createDetail('Interest', app.interest, true));
    details.appendChild(createDetail('Referral', app.referral_name));
    details.appendChild(createDetail('Invite Code', app.referral_code));
    details.appendChild(createDetail('How Heard', prettyHeard(app.how_heard)));

    var actions = document.createElement('div');
    actions.className = 'card-actions';

    if (app.status === 'pending') {
      var approveButton = document.createElement('button');
      approveButton.className = 'secondary-btn';
      approveButton.type = 'button';
      approveButton.textContent = 'Approve';
      approveButton.addEventListener('click', function() {
        approveApplication(app, approveButton);
      });
      actions.appendChild(approveButton);
    }

    var deleteButton = document.createElement('button');
    deleteButton.className = 'danger-btn';
    deleteButton.type = 'button';
    deleteButton.textContent = 'Delete';
    deleteButton.addEventListener('click', function() {
      deleteApplication(app, deleteButton);
    });
    actions.appendChild(deleteButton);

    if (app.status === 'verified') {
      var inviteArea = document.createElement('div');
      inviteArea.className = 'invite-area';

      var inviteButton = document.createElement('button');
      inviteButton.className = 'invite-btn';
      inviteButton.type = 'button';
      inviteButton.textContent = 'Invite';

      var inviteError = document.createElement('div');
      inviteError.className = 'invite-error';
      inviteError.setAttribute('aria-live', 'polite');

      inviteButton.addEventListener('click', function() {
        inviteMember(app, inviteButton, inviteError);
      });

      inviteArea.appendChild(inviteButton);
      inviteArea.appendChild(inviteError);
      actions.appendChild(inviteArea);
    }

    card.appendChild(top);
    card.appendChild(details);
    card.appendChild(actions);
    return card;
  }

  function render() {
    renderCounts();
    content.textContent = '';

    if (activeTab === 'messages') {
      renderThreadsTab();
      return;
    }

    if (isLoading) {
      var loading = document.createElement('div');
      loading.className = 'loading-state';
      loading.textContent = 'Loading applications...';
      content.appendChild(loading);
      return;
    }

    var rows = getRowsForStatus(activeTab);
    if (!rows.length) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';

      var title = document.createElement('h2');
      title.className = 'empty-title';
      title.textContent = activeTab === 'pending' ? 'No pending applications.' : 'No approved applications.';

      var copy = document.createElement('p');
      copy.textContent = activeTab === 'pending'
        ? 'New applications will appear here after submission.'
        : 'Approved applicants will appear here after review.';

      empty.appendChild(title);
      empty.appendChild(copy);
      content.appendChild(empty);
      return;
    }

    var grid = document.createElement('div');
    grid.className = 'application-grid';
    rows.forEach(function(app) {
      grid.appendChild(createCard(app));
    });
    content.appendChild(grid);
  }

  function updateLocalRow(updatedRow) {
    applications = applications.map(function(app) {
      return app.id === updatedRow.id ? updatedRow : app;
    });
  }

  function approveApplication(app, button) {
    if (!app.id) {
      setStatus('This row is missing an id, so it cannot be approved from the dashboard.', true);
      return;
    }

    button.disabled = true;
    button.textContent = 'Approving';
    setStatus('');

    callAdmin('approve', { id: app.id }).then(function(result) {
      if (!result.ok || !result.data || !result.data.data) {
        button.disabled = false;
        button.textContent = 'Approve';
        var msg = (result.data && result.data.error) || 'Could not approve this applicant.';
        setStatus(msg, true);
        return;
      }

      updateLocalRow(result.data.data);
      setActiveTab('verified');
      setStatus('Applicant approved.');
    }, function() {
      button.disabled = false;
      button.textContent = 'Approve';
      setStatus('Network error. Could not approve this applicant.', true);
    });
  }

  function deleteApplication(app, button) {
    if (!app.id) {
      setStatus('This row is missing an id, so it cannot be deleted from the dashboard.', true);
      return;
    }

    var name = getFullName(app);
    if (!window.confirm('Delete application from ' + name + '?\n\nThis cannot be undone.')) {
      return;
    }

    button.disabled = true;
    button.textContent = 'Deleting';
    setStatus('');

    callAdmin('delete', { id: app.id }).then(function(result) {
      if (!result.ok) {
        button.disabled = false;
        button.textContent = 'Delete';
        var msg = (result.data && result.data.error) || 'Could not delete this applicant.';
        setStatus(msg, true);
        return;
      }

      applications = applications.filter(function(row) {
        return row.id !== app.id;
      });
      render();
      setStatus('Applicant deleted.');
    }, function() {
      button.disabled = false;
      button.textContent = 'Delete';
      setStatus('Network error. Could not delete this applicant.', true);
    });
  }

  function inviteMember(member, button, errorEl) {
    if (!member.email) {
      errorEl.textContent = 'This applicant does not have an email address.';
      return;
    }

    button.disabled = true;
    button.textContent = 'Sending\u2026';
    errorEl.textContent = '';

    callAdmin('invite', { email: member.email }).then(function(result) {
      if (!result.ok) {
        button.disabled = false;
        button.textContent = 'Invite';
        errorEl.textContent = (result.data && result.data.error) || 'Could not send invite.';
        return;
      }

      button.textContent = 'Invited \u2713';
      button.disabled = true;
    }, function() {
      button.disabled = false;
      button.textContent = 'Invite';
      errorEl.textContent = 'Could not send invite.';
    });
  }

  loginForm.addEventListener('submit', function(event) {
    event.preventDefault();
    var typed = passwordInput.value;
    loginError.textContent = 'Checking\u2026';
    var submitBtn = loginForm.querySelector('button[type="submit"]');
    if (submitBtn) submitBtn.disabled = true;

    sessionStorage.setItem(PASSWORD_KEY, typed);
    callAdmin('verify', {}).then(function(result) {
      if (submitBtn) submitBtn.disabled = false;
      if (result.ok && result.data && result.data.ok) {
        loginError.textContent = '';
        unlock();
        return;
      }
      sessionStorage.removeItem(PASSWORD_KEY);
      loginError.textContent = result.status === 401 ? 'Incorrect password.' : 'Could not verify password. Try again.';
      passwordInput.select();
    }, function() {
      if (submitBtn) submitBtn.disabled = false;
      sessionStorage.removeItem(PASSWORD_KEY);
      loginError.textContent = 'Network error. Try again.';
    });
  });

  tabButtons.forEach(function(button) {
    button.addEventListener('click', function() {
      setActiveTab(button.getAttribute('data-tab'));
    });
  });

  refreshBtn.addEventListener('click', function() {
    fetchApplications();
    fetchThreads();
  });

  function openThread(threadId) {
    currentThreadId = threadId;
    msgModal.classList.remove('hidden');
    msgModalTitle.textContent = 'Conversation';
    msgModalSub.textContent = '';
    msgModalBody.innerHTML = '<div class="msg-modal-empty">Loading\u2026</div>';

    callAdmin('get_thread', { id: threadId }).then(function(result) {
      if (!result.ok || !result.data || !result.data.data) {
        msgModalBody.innerHTML = '<div class="msg-modal-empty">Could not load conversation.</div>';
        return;
      }
      renderThread(result.data.data);
    }, function() {
      msgModalBody.innerHTML = '<div class="msg-modal-empty">Network error loading conversation.</div>';
    });
  }

  function renderThread(thread) {
    msgModalTitle.textContent = thread.member_a.name + '  \u00b7  ' + thread.member_b.name;
    var subParts = [];
    if (thread.member_a.club) subParts.push(thread.member_a.name + ' \u2014 ' + thread.member_a.club);
    if (thread.member_b.club) subParts.push(thread.member_b.name + ' \u2014 ' + thread.member_b.club);
    msgModalSub.textContent = subParts.join('   \u00b7   ');

    if (!thread.messages || !thread.messages.length) {
      msgModalBody.innerHTML = '<div class="msg-modal-empty">No messages in this conversation.</div>';
      return;
    }

    msgModalBody.innerHTML = '';
    thread.messages.forEach(function(m) {
      var sender = m.sender_id === thread.member_a.id ? thread.member_a :
                   m.sender_id === thread.member_b.id ? thread.member_b :
                   { name: 'Unknown' };
      var row = document.createElement('div');
      row.className = 'msg-row';
      row.setAttribute('data-message-id', m.id);

      var head = document.createElement('div');
      head.className = 'msg-row-head';
      var senderEl = document.createElement('div');
      senderEl.className = 'msg-row-sender';
      senderEl.textContent = sender.name;
      var timeEl = document.createElement('div');
      timeEl.className = 'msg-row-time';
      timeEl.textContent = formatDateTime(m.created_at);
      var delBtn = document.createElement('button');
      delBtn.className = 'msg-row-del';
      delBtn.type = 'button';
      delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', function() {
        deleteMessage(m.id, row, delBtn);
      });
      head.appendChild(senderEl);
      head.appendChild(timeEl);
      head.appendChild(delBtn);

      var body = document.createElement('div');
      body.className = 'msg-row-body';
      body.textContent = m.body;

      row.appendChild(head);
      row.appendChild(body);
      msgModalBody.appendChild(row);
    });
  }

  function closeThreadModal() {
    msgModal.classList.add('hidden');
    currentThreadId = null;
    msgModalBody.innerHTML = '';
  }

  function deleteMessage(messageId, rowEl, btn) {
    if (!messageId) return;
    if (!window.confirm('Delete this message? This cannot be undone.')) return;
    btn.disabled = true;
    var prev = btn.textContent;
    btn.textContent = 'Deleting';
    callAdmin('delete_message', { id: messageId }).then(function(result) {
      if (!result.ok) {
        btn.disabled = false;
        btn.textContent = prev;
        alert((result.data && result.data.error) || 'Could not delete message.');
        return;
      }
      if (rowEl && rowEl.parentNode) rowEl.parentNode.removeChild(rowEl);
      if (!msgModalBody.querySelector('.msg-row')) {
        msgModalBody.innerHTML = '<div class="msg-modal-empty">No messages in this conversation.</div>';
      }
      fetchThreads();
    }, function() {
      btn.disabled = false;
      btn.textContent = prev;
      alert('Network error. Could not delete message.');
    });
  }

  function deleteThread() {
    if (!currentThreadId) return;
    if (!window.confirm('Delete this entire conversation and all its messages? This cannot be undone.')) return;
    msgModalDelete.disabled = true;
    var prev = msgModalDelete.textContent;
    msgModalDelete.textContent = 'Deleting\u2026';
    callAdmin('delete_thread', { id: currentThreadId }).then(function(result) {
      msgModalDelete.disabled = false;
      msgModalDelete.textContent = prev;
      if (!result.ok) {
        alert((result.data && result.data.error) || 'Could not delete conversation.');
        return;
      }
      closeThreadModal();
      fetchThreads();
      setStatus('Conversation deleted.');
    }, function() {
      msgModalDelete.disabled = false;
      msgModalDelete.textContent = prev;
      alert('Network error. Could not delete conversation.');
    });
  }

  msgModalClose.addEventListener('click', closeThreadModal);
  msgModalDelete.addEventListener('click', deleteThread);
  msgModal.addEventListener('click', function(e) {
    if (e.target === msgModal) closeThreadModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && !msgModal.classList.contains('hidden')) closeThreadModal();
  });

  if (sessionStorage.getItem(UNLOCKED_KEY) === 'true' && getAdminPassword()) {
    unlock();
  } else {
    sessionStorage.removeItem(UNLOCKED_KEY);
    sessionStorage.removeItem(PASSWORD_KEY);
    showLogin();
  }
})();
</script>
</body>
</html>
