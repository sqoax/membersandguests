
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin &mdash; Members &amp; Guests</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%231a2744'/%3E%3Ctext x='16' y='21.5' text-anchor='middle' font-family='Georgia,serif' font-size='13' font-weight='400' fill='%23f8f5f0' letter-spacing='-0.5'%3EM%26G%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --cream: #f8f5f0;
  --cream-muted: #ede9e3;
  --navy: #1a2744;
  --navy-light: #243354;
  --forest: #2d4a2d;
  --gold: #c9a96e;
  --text-cream: #f8f5f0;
  --text-muted: rgba(248, 245, 240, 0.66);
  --text-dark: #1a2744;
  --text-dark-muted: rgba(26, 39, 68, 0.58);
  --field-border: rgba(26, 39, 68, 0.12);
  --field-border-focus: rgba(26, 39, 68, 0.35);
  --field-bg: rgba(26, 39, 68, 0.02);
  --danger: #8a2d2d;
  --serif: 'Cormorant Garamond', 'Georgia', serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  min-height: 100vh;
  font-family: var(--sans);
  font-weight: 300;
  color: var(--text-dark);
  background:
    linear-gradient(180deg, rgba(248, 245, 240, 0.96), rgba(237, 233, 227, 0.9)),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: auto, 220px 220px;
  line-height: 1.6;
}

button,
input {
  font: inherit;
}

button {
  cursor: pointer;
}

.hidden {
  display: none !important;
}

.login-screen {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 2rem;
  background: var(--navy);
  position: relative;
  overflow: hidden;
}

.login-screen::after {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events: none;
}

.login-panel {
  width: min(100%, 420px);
  position: relative;
  z-index: 1;
  text-align: center;
}

.wordmark {
  font-family: var(--serif);
  font-size: clamp(2.4rem, 9vw, 4.2rem);
  font-weight: 300;
  color: var(--text-cream);
  letter-spacing: -0.015em;
  line-height: 1;
  margin-bottom: 0.75rem;
}

.login-kicker {
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: clamp(2.2rem, 8vw, 3rem);
}

.login-form {
  display: grid;
  gap: 0.9rem;
}

.password-input {
  width: 100%;
  min-height: 54px;
  padding: 0 1rem;
  color: var(--text-cream);
  background: rgba(248, 245, 240, 0.06);
  border: 1px solid rgba(248, 245, 240, 0.18);
  border-radius: 0;
  outline: none;
  text-align: center;
  letter-spacing: 0.04em;
  transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
}

.password-input::placeholder {
  color: rgba(248, 245, 240, 0.45);
  letter-spacing: 0.08em;
}

.password-input:focus {
  border-color: var(--gold);
  background: rgba(248, 245, 240, 0.09);
  box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.12);
}

.primary-btn,
.secondary-btn,
.invite-btn,
.danger-btn,
.tab-btn {
  min-height: 44px;
  border-radius: 0;
  transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease, opacity 0.25s ease, transform 0.25s ease;
}

.primary-btn {
  border: 1px solid var(--gold);
  background: var(--gold);
  color: var(--navy);
  padding: 0 1.4rem;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.primary-btn:hover {
  background: #d7bb83;
  border-color: #d7bb83;
}

.primary-btn:active,
.secondary-btn:active,
.invite-btn:active,
.danger-btn:active,
.tab-btn:active {
  transform: translateY(1px);
}

.login-error {
  min-height: 1.4rem;
  color: #e7b4a8;
  font-size: 0.78rem;
  letter-spacing: 0.02em;
}

.dashboard {
  min-height: 100vh;
}

.admin-header {
  background: var(--navy);
  color: var(--text-cream);
}

.admin-header-inner {
  max-width: 1180px;
  margin: 0 auto;
  padding: clamp(2.5rem, 5vw, 4.5rem) 1.5rem clamp(2rem, 4vw, 3.2rem);
}

.admin-wordmark {
  font-family: var(--serif);
  font-size: 1.12rem;
  font-weight: 400;
  color: var(--text-cream);
  line-height: 1;
  margin-bottom: clamp(2rem, 4vw, 2.8rem);
}

.admin-title-row {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 1.5rem;
}

.admin-title {
  font-family: var(--serif);
  font-size: clamp(2.3rem, 6vw, 4rem);
  font-weight: 300;
  color: var(--text-cream);
  letter-spacing: -0.015em;
  line-height: 1.05;
}

.admin-subtitle {
  max-width: 520px;
  color: var(--text-muted);
  font-size: 0.92rem;
  line-height: 1.7;
  margin-top: 0.95rem;
}

.refresh-btn {
  flex: 0 0 auto;
}

.dashboard-main {
  max-width: 1180px;
  margin: 0 auto;
  padding: clamp(1.6rem, 4vw, 2.8rem) 1.5rem clamp(4rem, 8vw, 6rem);
}

.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--field-border);
  margin-bottom: clamp(1.5rem, 4vw, 2.4rem);
}

.tab-btn {
  background: transparent;
  border: 0;
  border-bottom: 2px solid transparent;
  color: var(--text-dark-muted);
  padding: 0 1.1rem;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.tab-btn:first-child {
  padding-left: 0;
}

.tab-btn.active {
  color: var(--text-dark);
  border-color: var(--gold);
}

.status-line {
  min-height: 1.6rem;
  color: var(--text-dark-muted);
  font-size: 0.82rem;
  margin-bottom: 1rem;
}

.status-line.error {
  color: var(--danger);
}

.application-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr));
  gap: 1rem;
}

.application-card {
  background: rgba(255, 255, 255, 0.48);
  border: 1px solid var(--field-border);
  padding: 1.35rem;
  box-shadow: 0 20px 50px rgba(26, 39, 68, 0.05);
}

.card-top {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  align-items: start;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--field-border);
  margin-bottom: 1rem;
}

.applicant-name {
  font-family: var(--serif);
  font-size: 1.72rem;
  font-weight: 400;
  color: var(--text-dark);
  letter-spacing: -0.01em;
  line-height: 1.1;
}

.applicant-email {
  color: var(--text-dark-muted);
  font-size: 0.82rem;
  word-break: break-word;
  margin-top: 0.28rem;
}

.date-pill {
  flex: 0 0 auto;
  color: var(--text-dark-muted);
  border: 1px solid var(--field-border);
  padding: 0.35rem 0.5rem;
  font-size: 0.66rem;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  white-space: nowrap;
}

.detail-list {
  display: grid;
  gap: 0.7rem;
}

.detail-item {
  display: grid;
  grid-template-columns: minmax(92px, 0.42fr) 1fr;
  gap: 0.85rem;
}

.detail-label {
  color: var(--text-dark-muted);
  font-size: 0.64rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.detail-value {
  color: var(--text-dark);
  font-size: 0.86rem;
  word-break: break-word;
}

.detail-item.full {
  grid-template-columns: 1fr;
  gap: 0.25rem;
}

.card-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.65rem;
  margin-top: 1.25rem;
  padding-top: 1rem;
  border-top: 1px solid var(--field-border);
}

.secondary-btn,
.invite-area {
  flex: 1 1 130px;
  display: grid;
  gap: 0.35rem;
}

.invite-btn,
.danger-btn {
  flex: 1 1 130px;
  border: 1px solid var(--navy);
  padding: 0 1rem;
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.13em;
  text-transform: uppercase;
}

.invite-btn {
  width: 100%;
  color: var(--gold);
  background: transparent;
  border-color: var(--gold);
}

.invite-btn:hover {
  color: var(--navy);
  background: var(--gold);
}

.invite-error {
  min-height: 1rem;
  color: var(--danger);
  font-size: 0.72rem;
  line-height: 1.35;
}

.secondary-btn {
  color: var(--text-cream);
  background: var(--navy);
}

.secondary-btn:hover {
  background: var(--navy-light);
  border-color: var(--navy-light);
}

.danger-btn {
  color: var(--danger);
  background: transparent;
  border-color: rgba(138, 45, 45, 0.28);
}

.danger-btn:hover {
  color: var(--text-cream);
  background: var(--danger);
  border-color: var(--danger);
}

button:disabled {
  cursor: wait;
  opacity: 0.62;
}

.empty-state,
.loading-state {
  border: 1px solid var(--field-border);
  padding: clamp(2.2rem, 7vw, 4rem) 1.5rem;
  text-align: center;
  color: var(--text-dark-muted);
  background: rgba(255, 255, 255, 0.38);
}

.empty-title {
  font-family: var(--serif);
  font-size: clamp(1.7rem, 4vw, 2.4rem);
  font-weight: 300;
  color: var(--text-dark);
  letter-spacing: -0.01em;
  margin-bottom: 0.35rem;
}

@media (max-width: 720px) {
  .admin-title-row,
  .card-top {
    display: grid;
    align-items: start;
  }

  .refresh-btn {
    width: 100%;
  }

  .tabs {
    overflow-x: auto;
  }

  .tab-btn {
    flex: 1 0 auto;
    padding: 0 0.8rem;
  }

  .tab-btn:first-child {
    padding-left: 0.2rem;
  }

  .detail-item {
    grid-template-columns: 1fr;
    gap: 0.2rem;
  }

  .date-pill {
    width: fit-content;
  }
}
</style>
</head>
<body>
<section class="login-screen" id="login-screen">
  <div class="login-panel">
    <div class="wordmark">Members &amp; Guests</div>
    <div class="login-kicker">Admin Dashboard</div>
    <form class="login-form" id="login-form">
      <input class="password-input" id="admin-password" type="password" placeholder="Password" autocomplete="current-password" aria-label="Admin password">
      <button class="primary-btn" type="submit">Enter</button>
      <p class="login-error" id="login-error" aria-live="polite"></p>
    </form>
  </div>
</section>

<section class="dashboard hidden" id="dashboard">
  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-wordmark">Members &amp; Guests</div>
      <div class="admin-title-row">
        <div>
          <h1 class="admin-title">Applications</h1>
          <p class="admin-subtitle">Review membership requests, approve verified applicants, or remove entries from the application queue.</p>
        </div>
        <button class="primary-btn refresh-btn" id="refresh-btn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="tabs" role="tablist" aria-label="Application status">
      <button class="tab-btn active" id="pending-tab" type="button" role="tab" aria-selected="true" data-tab="pending">Pending <span id="pending-count">0</span></button>
      <button class="tab-btn" id="approved-tab" type="button" role="tab" aria-selected="false" data-tab="verified">Approved <span id="approved-count">0</span></button>
    </div>
    <p class="status-line" id="status-line" aria-live="polite"></p>
    <div id="content"></div>
  </main>
</section>

<script>
(function() {
  'use strict';

  var SUPABASE_URL = 'https://upohsbvsycwjsjbtwsll.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_OaX6cAttsvPQHx_Ru82v3Q_r0qXPX2N';
  var SUPABASE_SERVICE_ROLE_KEY = 'sb_secret_N-I-4deTj3RypWPKbrppkQ_hf_EHDos';
  var ADMIN_PASSWORD = 'mg-admin-2026';
  var UNLOCKED_KEY = 'mg_admin_unlocked';

  var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var supabaseAdmin = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_SERVICE_ROLE_KEY,
    { auth: { autoRefreshToken: false, persistSession: false } }
  );
  var loginScreen = document.getElementById('login-screen');
  var dashboard = document.getElementById('dashboard');
  var loginForm = document.getElementById('login-form');
  var passwordInput = document.getElementById('admin-password');
  var loginError = document.getElementById('login-error');
  var refreshBtn = document.getElementById('refresh-btn');
  var tabButtons = Array.prototype.slice.call(document.querySelectorAll('.tab-btn'));
  var pendingCount = document.getElementById('pending-count');
  var approvedCount = document.getElementById('approved-count');
  var statusLine = document.getElementById('status-line');
  var content = document.getElementById('content');

  var applications = [];
  var activeTab = 'pending';
  var isLoading = false;

  function unlock() {
    sessionStorage.setItem(UNLOCKED_KEY, 'true');
    loginScreen.classList.add('hidden');
    dashboard.classList.remove('hidden');
    fetchApplications();
  }

  function showLogin() {
    loginScreen.classList.remove('hidden');
    dashboard.classList.add('hidden');
    setTimeout(function() {
      passwordInput.focus();
    }, 0);
  }

  function setStatus(message, isError) {
    statusLine.textContent = message || '';
    statusLine.classList.toggle('error', !!isError);
  }

  function fetchApplications() {
    isLoading = true;
    setStatus('Loading applications...');
    render();

    supabase
      .from('applications')
      .select('*')
      .order('created_at', { ascending: false })
      .then(function(result) {
        isLoading = false;
        if (result.error) {
          setStatus('Could not load applications. Check Supabase table permissions and try again.', true);
          applications = [];
        } else {
          applications = result.data || [];
          setStatus('');
        }
        render();
      });
  }

  function getRowsForStatus(status) {
    return applications.filter(function(app) {
      return app.status === status;
    });
  }

  function renderCounts() {
    pendingCount.textContent = String(getRowsForStatus('pending').length);
    approvedCount.textContent = String(getRowsForStatus('verified').length);
  }

  function setActiveTab(tab) {
    activeTab = tab;
    tabButtons.forEach(function(button) {
      var isActive = button.getAttribute('data-tab') === activeTab;
      button.classList.toggle('active', isActive);
      button.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    render();
  }

  function formatValue(value) {
    if (value === null || value === undefined || value === '') return '-';
    return String(value);
  }

  function formatDate(value) {
    if (!value) return 'No date';
    var date = new Date(value);
    if (Number.isNaN(date.getTime())) return 'No date';
    return date.toLocaleDateString(undefined, {
      month: 'short',
      day: 'numeric',
      year: 'numeric'
    });
  }

  function getFullName(app) {
    var name = [app.first_name, app.last_name].filter(Boolean).join(' ').trim();
    return name || 'Unnamed applicant';
  }

  function createDetail(label, value, isFull) {
    var item = document.createElement('div');
    item.className = isFull ? 'detail-item full' : 'detail-item';

    var labelEl = document.createElement('div');
    labelEl.className = 'detail-label';
    labelEl.textContent = label;

    var valueEl = document.createElement('div');
    valueEl.className = 'detail-value';
    valueEl.textContent = formatValue(value);

    item.appendChild(labelEl);
    item.appendChild(valueEl);
    return item;
  }

  function createCard(app) {
    var card = document.createElement('article');
    card.className = 'application-card';

    var top = document.createElement('div');
    top.className = 'card-top';

    var identity = document.createElement('div');
    var name = document.createElement('h2');
    name.className = 'applicant-name';
    name.textContent = getFullName(app);

    var email = document.createElement('div');
    email.className = 'applicant-email';
    email.textContent = formatValue(app.email);

    identity.appendChild(name);
    identity.appendChild(email);

    var date = document.createElement('div');
    date.className = 'date-pill';
    date.textContent = formatDate(app.created_at);

    top.appendChild(identity);
    top.appendChild(date);

    var details = document.createElement('div');
    details.className = 'detail-list';
    details.appendChild(createDetail('Club', app.club_name));
    details.appendChild(createDetail('Location', app.club_location));
    details.appendChild(createDetail('Membership', app.membership_type));
    details.appendChild(createDetail('Member Since', app.member_since));
    details.appendChild(createDetail('Handicap', app.handicap));
    details.appendChild(createDetail('Host', app.willing_to_host));
    details.appendChild(createDetail('City', app.city));
    details.appendChild(createDetail('Interest', app.interest, true));
    details.appendChild(createDetail('Referral', app.referral_name));
    details.appendChild(createDetail('How Heard', app.how_heard));

    var actions = document.createElement('div');
    actions.className = 'card-actions';

    if (app.status === 'pending') {
      var approveButton = document.createElement('button');
      approveButton.className = 'secondary-btn';
      approveButton.type = 'button';
      approveButton.textContent = 'Approve';
      approveButton.addEventListener('click', function() {
        approveApplication(app, approveButton);
      });
      actions.appendChild(approveButton);
    }

    var deleteButton = document.createElement('button');
    deleteButton.className = 'danger-btn';
    deleteButton.type = 'button';
    deleteButton.textContent = 'Delete';
    deleteButton.addEventListener('click', function() {
      deleteApplication(app, deleteButton);
    });
    actions.appendChild(deleteButton);

    if (app.status === 'verified') {
      var inviteArea = document.createElement('div');
      inviteArea.className = 'invite-area';

      var inviteButton = document.createElement('button');
      inviteButton.className = 'invite-btn';
      inviteButton.type = 'button';
      inviteButton.textContent = 'Invite';

      var inviteError = document.createElement('div');
      inviteError.className = 'invite-error';
      inviteError.setAttribute('aria-live', 'polite');

      inviteButton.addEventListener('click', function() {
        inviteMember(app, inviteButton, inviteError);
      });

      inviteArea.appendChild(inviteButton);
      inviteArea.appendChild(inviteError);
      actions.appendChild(inviteArea);
    }

    card.appendChild(top);
    card.appendChild(details);
    card.appendChild(actions);
    return card;
  }

  function render() {
    renderCounts();
    content.textContent = '';

    if (isLoading) {
      var loading = document.createElement('div');
      loading.className = 'loading-state';
      loading.textContent = 'Loading applications...';
      content.appendChild(loading);
      return;
    }

    var rows = getRowsForStatus(activeTab);
    if (!rows.length) {
      var empty = document.createElement('div');
      empty.className = 'empty-state';

      var title = document.createElement('h2');
      title.className = 'empty-title';
      title.textContent = activeTab === 'pending' ? 'No pending applications.' : 'No approved applications.';

      var copy = document.createElement('p');
      copy.textContent = activeTab === 'pending'
        ? 'New applications will appear here after submission.'
        : 'Approved applicants will appear here after review.';

      empty.appendChild(title);
      empty.appendChild(copy);
      content.appendChild(empty);
      return;
    }

    var grid = document.createElement('div');
    grid.className = 'application-grid';
    rows.forEach(function(app) {
      grid.appendChild(createCard(app));
    });
    content.appendChild(grid);
  }

  function updateLocalRow(updatedRow) {
    applications = applications.map(function(app) {
      return app.id === updatedRow.id ? updatedRow : app;
    });
  }

  function approveApplication(app, button) {
    if (!app.id) {
      setStatus('This row is missing an id, so it cannot be approved from the dashboard.', true);
      return;
    }

    button.disabled = true;
    button.textContent = 'Approving';
    setStatus('');

    supabase
      .from('applications')
      .update({ status: 'verified' })
      .eq('id', app.id)
      .select()
      .single()
      .then(function(result) {
        if (result.error) {
          button.disabled = false;
          button.textContent = 'Approve';
          setStatus('Could not approve this applicant. Check Supabase permissions and try again.', true);
          return;
        }

        updateLocalRow(result.data);
        setActiveTab('verified');
        setStatus('Applicant approved.');
      });
  }

  function deleteApplication(app, button) {
    if (!app.id) {
      setStatus('This row is missing an id, so it cannot be deleted from the dashboard.', true);
      return;
    }

    button.disabled = true;
    button.textContent = 'Deleting';
    setStatus('');

    supabase
      .from('applications')
      .delete()
      .eq('id', app.id)
      .then(function(result) {
        if (result.error) {
          button.disabled = false;
          button.textContent = 'Delete';
          setStatus('Could not delete this applicant. Check Supabase permissions and try again.', true);
          return;
        }

        applications = applications.filter(function(row) {
          return row.id !== app.id;
        });
        render();
        setStatus('Applicant deleted.');
      });
  }

  function inviteMember(member, button, errorEl) {
    if (!member.email) {
      errorEl.textContent = 'This applicant does not have an email address.';
      return;
    }

    button.disabled = true;
    button.textContent = 'Sending\u2026';
    errorEl.textContent = '';

    supabaseAdmin.auth.admin.inviteUserByEmail(member.email).then(function(result) {
      if (result.error) {
        button.disabled = false;
        button.textContent = 'Invite';
        errorEl.textContent = result.error.message || 'Could not send invite.';
        return;
      }

      button.textContent = 'Invited \u2713';
      button.disabled = true;
    }, function() {
      button.disabled = false;
      button.textContent = 'Invite';
      errorEl.textContent = 'Could not send invite.';
    });
  }

  loginForm.addEventListener('submit', function(event) {
    event.preventDefault();
    if (passwordInput.value === ADMIN_PASSWORD) {
      loginError.textContent = '';
      unlock();
      return;
    }

    loginError.textContent = 'Incorrect password.';
    passwordInput.select();
  });

  tabButtons.forEach(function(button) {
    button.addEventListener('click', function() {
      setActiveTab(button.getAttribute('data-tab'));
    });
  });

  refreshBtn.addEventListener('click', fetchApplications);

  if (sessionStorage.getItem(UNLOCKED_KEY) === 'true') {
    unlock();
  } else {
    showLogin();
  }
})();
</script>
</body>
</html>
